<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HADEUX — Budget du foyer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 32 C48 24 40 20 32 22 C20 26 16 42 24 54 C30 64 42 72 50 80 Z' fill='%23F08C8C'/><path d='M50 32 C52 24 60 20 68 22 C80 26 84 42 76 54 C70 64 58 72 50 80 Z' fill='%23A491E2'/><path d='M40 42 C40 33 44 28 50 28 C56 28 60 33 60 42 L60 55 C60 61 56 65 50 71 C44 65 40 61 40 55 Z' fill='%2347406A'/><circle cx='45' cy='38' r='2' fill='%23fff'/><circle cx='45' cy='44' r='2' fill='%23fff'/><circle cx='45' cy='50' r='2' fill='%23fff'/><path d='M41 56 L59 56 L50 71 Z' fill='%23F1ECF8'/></svg>">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#F4EEE2">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HADEUX">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F4EEE2; --bg2:#EBE3D3; --surface:#FFFDF8; --surface2:#FBF6EC;
    --ink:#242219; --muted:#857F6E; --faint:#ABA69A; --line:#E4DBC9;
    --green:#2E5D4B; --green2:#3B7159; --green-soft:#E6EFE7;
    --terra:#BF5A34; --terra-soft:#F6E4DA;
    --gold:#C29A44; --blue:#3C6E8F; --blue-soft:#E2ECF1;
    --shadow:0 1px 2px rgba(40,35,20,.04),0 8px 24px rgba(40,35,20,.06);
    --shadow-lg:0 4px 12px rgba(40,35,20,.08),0 20px 50px rgba(40,35,20,.12);
    --r:16px; --r-sm:11px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Manrope',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(46,93,75,.07), transparent 60%),
      radial-gradient(900px 500px at 5% 110%, rgba(191,90,52,.06), transparent 55%),
      var(--bg);
    color:var(--ink);-webkit-font-smoothing:antialiased;
    font-variant-numeric:tabular-nums;
    line-height:1.5;overflow-x:hidden;
  }
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.01em;line-height:1.1}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
  input,select{font-family:inherit;font-size:15px;color:var(--ink)}
  ::selection{background:var(--green);color:#fff}

  /* ---------- Layout ---------- */
  .app{max-width:1080px;margin:0 auto;padding:0 20px 120px}
  header.top{
    display:flex;align-items:center;justify-content:space-between;
    padding:26px 4px 20px;gap:16px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:13px}
  .brand .mark{
    width:46px;height:46px;flex:none;display:grid;place-items:center;
    filter:drop-shadow(0 4px 8px rgba(71,64,106,.18));
  }
  .brand .mark svg{width:100%;height:100%;display:block}
  .brand h1{font-size:24px}
  .brand p{font-size:12.5px;color:var(--muted);letter-spacing:.02em;margin-top:1px}

  /* Month switcher */
  .monthbar{display:flex;align-items:center;gap:6px;background:var(--surface);
    border:1px solid var(--line);border-radius:100px;padding:5px;box-shadow:var(--shadow)}
  .monthbar button.arrow{width:34px;height:34px;border-radius:100px;display:grid;place-items:center;
    color:var(--muted);font-size:17px;transition:.15s}
  .monthbar button.arrow:hover{background:var(--bg2);color:var(--ink)}
  .monthbar .label{min-width:150px;text-align:center;font-weight:600;font-size:14.5px;text-transform:capitalize}
  .monthbar .today{font-size:11px;color:var(--green);cursor:pointer;padding:0 8px;font-weight:600}

  /* Tabs */
  nav.tabs{display:flex;flex-wrap:wrap;gap:4px;background:var(--surface);border:1px solid var(--line);
    border-radius:18px;padding:6px;box-shadow:var(--shadow)}
  nav.tabs button{padding:8px 13px;border-radius:100px;font-size:13.5px;font-weight:600;color:var(--muted);
    white-space:nowrap;transition:.18s;display:flex;align-items:center;gap:6px}
  nav.tabs button .ic{font-size:14px}
  nav.tabs button:hover{color:var(--ink)}
  nav.tabs button.active{background:var(--ink);color:var(--surface);box-shadow:0 3px 10px rgba(36,34,25,.25)}

  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;
    margin:22px 0;flex-wrap:wrap}

  /* Header tools + roue crantée */
  .headtools{display:flex;align-items:center;gap:10px}
  .gearbtn{width:40px;height:40px;flex:none;border-radius:100px;display:grid;place-items:center;
    background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow);font-size:18px;color:var(--muted);transition:.15s}
  .gearbtn:hover{color:var(--ink);background:var(--surface2)}
  .gearbtn.active{background:var(--ink);color:var(--surface);border-color:var(--ink)}

  /* Barre de pôles (haut, desktop) */
  .poles{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);
    border-radius:18px;padding:6px;box-shadow:var(--shadow)}
  .poles button{flex:1;padding:10px 12px;border-radius:100px;font-size:13.5px;font-weight:600;color:var(--muted);
    white-space:nowrap;transition:.18s;display:flex;align-items:center;justify-content:center;gap:7px}
  .poles button .ic{font-size:15px}
  .poles button:hover{color:var(--ink)}
  .poles button.active{background:var(--ink);color:var(--surface);box-shadow:0 3px 10px rgba(36,34,25,.25)}

  /* Barre du bas (mobile) */
  .bottombar{display:none}
  @media(max-width:640px){
    .poles{display:none}
    .bottombar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:50;justify-content:space-around;
      background:rgba(255,253,248,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);
      padding:7px 4px calc(7px + env(safe-area-inset-bottom))}
    .bottombar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:3px 2px;
      color:var(--faint);font-size:9.5px;font-weight:700;border-radius:10px;transition:.12s;min-width:0}
    .bottombar button .ic{font-size:20px;line-height:1;filter:grayscale(.4) opacity(.7)}
    .bottombar button.active{color:var(--green)}
    .bottombar button.active .ic{filter:none}
    .app{padding-bottom:calc(84px + env(safe-area-inset-bottom))}
    .fab{bottom:calc(84px + env(safe-area-inset-bottom))}
  }

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow)}
  .grid{display:grid;gap:16px}
  section.view{animation:fade .13s ease-out both}
  @keyframes fade{from{opacity:.4}to{opacity:1}}

  /* Hero settlement */
  .hero{padding:26px 26px 24px;position:relative;overflow:hidden;
    background:linear-gradient(160deg,#33604e,#274b3d);color:#F3EEE2;border:none;
    box-shadow:var(--shadow-lg)}
  .hero::before{content:"";position:absolute;right:-60px;top:-60px;width:260px;height:260px;
    border-radius:50%;background:radial-gradient(circle,rgba(201,162,75,.35),transparent 70%)}
  .hero .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;opacity:.7;font-weight:600}
  .hero .headline{font-family:'Fraunces',serif;font-size:29px;line-height:1.15;margin:10px 0 4px;max-width:640px}
  .hero .headline b{color:#F0C863;font-weight:600}
  .hero .sub{opacity:.82;font-size:14.5px;max-width:600px}
  .hero .settle-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .chip{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);
    padding:9px 15px;border-radius:100px;font-size:13.5px;font-weight:600;display:flex;gap:8px;align-items:center;backdrop-filter:blur(4px)}
  .chip b{color:#F0C863}

  /* Stat grid */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .stat{padding:18px 18px 16px}
  .stat .k{font-size:12.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
  .stat .v{font-family:'Fraunces',serif;font-size:27px;margin-top:9px}
  .stat .d{font-size:12px;color:var(--muted);margin-top:3px}
  .stat.accent .v{color:var(--green)}
  .pos{color:var(--green)!important} .neg{color:var(--terra)!important}

  .cols{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start}
  .card h2.title{font-size:19px;padding:20px 22px 0}
  .card .sub-t{font-size:13px;color:var(--muted);padding:2px 22px 0}

  /* Person cards */
  .persons{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .person{padding:20px}
  .person .pname{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15.5px}
  .person .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .person .line{display:flex;justify-content:space-between;font-size:14px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .person .line:last-child{border-bottom:none}
  .person .line .lbl{color:var(--muted)}
  .person .rest{margin-top:10px;padding-top:12px;border-top:2px solid var(--ink);display:flex;justify-content:space-between;font-weight:700}
  .person .rest .val{font-family:'Fraunces',serif;font-size:22px}

  /* Bars */
  .bars{padding:6px 22px 22px}
  .bar-row{display:flex;align-items:center;gap:12px;padding:9px 0}
  .bar-row .em{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:15px;flex:none;background:var(--surface2);border:1px solid var(--line)}
  .bar-row .info{flex:1;min-width:0}
  .bar-row .info .top{display:flex;justify-content:space-between;font-size:13.5px;font-weight:600;margin-bottom:5px}
  .bar-row .info .top .amt{color:var(--muted);font-weight:600}
  .track{height:8px;border-radius:100px;background:var(--bg2);overflow:hidden}
  .fill{height:100%;border-radius:100px;transition:width .6s cubic-bezier(.4,0,.2,1)}

  /* Split donut legend */
  .split{display:flex;align-items:center;gap:24px;padding:22px}
  .donut{width:130px;height:130px;flex:none;border-radius:50%;position:relative}
  .donut::after{content:"";position:absolute;inset:22px;background:var(--surface);border-radius:50%;box-shadow:inset 0 1px 3px rgba(0,0,0,.06)}
  .donut .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center;z-index:2}
  .donut .center .big{font-family:'Fraunces',serif;font-size:20px}
  .donut .center .small{font-size:10.5px;color:var(--muted)}
  .legend{flex:1;display:grid;gap:10px}
  .legend .li{display:flex;align-items:center;gap:9px;font-size:13.5px}
  .legend .sw{width:11px;height:11px;border-radius:3px;flex:none}
  .legend .li .v{margin-left:auto;font-weight:600}

  /* Table / list */
  .list{padding:8px 10px 12px}
  .row{display:flex;align-items:center;gap:14px;padding:12px 12px;border-radius:12px;transition:.12s}
  .row:hover{background:var(--surface2)}
  .row .em{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;flex:none;background:var(--surface2);border:1px solid var(--line)}
  .row .main{flex:1;min-width:0}
  .row .main .l1{font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .row .main .l2{font-size:12.5px;color:var(--muted);margin-top:1px}
  .row .amt{font-family:'Fraunces',serif;font-size:17px;white-space:nowrap}
  .row .del{opacity:0;color:var(--muted);width:30px;height:30px;border-radius:8px;font-size:15px;transition:.12s;flex:none}
  .row:hover .del{opacity:1}
  .row .del:hover{background:var(--terra-soft);color:var(--terra)}
  .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:.02em}
  .tag.commune{background:var(--green-soft);color:var(--green)}
  .tag.perso{background:var(--blue-soft);color:var(--blue)}
  .tag.pot{background:#F3E9CF;color:#9A7B1E}

  .empty{text-align:center;padding:54px 20px;color:var(--muted)}
  .empty .big{font-size:38px;margin-bottom:10px;opacity:.7}
  .empty p{font-size:14px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:100px;
    font-weight:700;font-size:14px;transition:.16s;border:1px solid transparent}
  .btn.primary{background:var(--ink);color:var(--surface);box-shadow:0 4px 12px rgba(36,34,25,.22)}
  .btn.primary:hover{transform:translateY(-1px);box-shadow:0 7px 18px rgba(36,34,25,.3)}
  .btn.ghost{background:var(--surface);border-color:var(--line);color:var(--ink);box-shadow:var(--shadow)}
  .btn.ghost:hover{background:var(--surface2)}
  .btn.sm{padding:8px 14px;font-size:13px}
  .btn .plus{font-size:17px;line-height:1}

  .filters{display:flex;gap:7px;flex-wrap:wrap}
  .filters button{padding:7px 14px;border-radius:100px;font-size:13px;font-weight:600;color:var(--muted);
    border:1px solid var(--line);background:var(--surface);transition:.14s}
  .filters button.on{background:var(--ink);color:var(--surface);border-color:var(--ink)}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(30,26,15,.42);backdrop-filter:blur(3px);
    display:none;align-items:flex-end;justify-content:center;z-index:60;padding:0}
  .overlay.show{display:flex;animation:fade .2s}
  .modal{background:var(--surface);width:100%;max-width:520px;border-radius:22px 22px 0 0;
    max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideup .28s cubic-bezier(.2,.8,.2,1)}
  @media(min-width:560px){.overlay{align-items:center;padding:20px}.modal{border-radius:24px}}
  @keyframes slideup{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
  .modal .mhead{display:flex;align-items:center;justify-content:space-between;padding:22px 24px 6px}
  .modal .mhead h2{font-size:21px}
  .modal .mhead .x{width:34px;height:34px;border-radius:100px;font-size:18px;color:var(--muted);display:grid;place-items:center}
  .modal .mhead .x:hover{background:var(--bg2)}
  .modal form{padding:14px 24px 26px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:7px;letter-spacing:.02em}
  .field input,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;
    background:var(--surface2);transition:.15s;outline:none}
  .field input:focus,.field select:focus{border-color:var(--green);background:var(--surface);box-shadow:0 0 0 3px var(--green-soft)}
  .field.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field.two .field{margin:0}
  .seg{display:flex;gap:6px;background:var(--bg2);padding:5px;border-radius:12px}
  .seg button{flex:1;padding:10px;border-radius:9px;font-weight:700;font-size:13.5px;color:var(--muted);transition:.15s}
  .seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
  .catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px;max-height:190px;overflow-y:auto;padding:2px}
  .catgrid button{padding:11px 6px;border-radius:12px;border:1.5px solid var(--line);background:var(--surface2);
    display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--muted);transition:.13s}
  .catgrid button .e{font-size:20px}
  .catgrid button.on{border-color:var(--green);background:var(--green-soft);color:var(--green)}
  .modal .savebtn{width:100%;justify-content:center;padding:14px;font-size:15px;margin-top:6px}

  .amount-input{position:relative}
  .amount-input input{font-family:'Fraunces',serif;font-size:30px;padding:14px 44px 14px 16px;text-align:right}
  .amount-input .cur{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-family:'Fraunces',serif;font-size:24px;color:var(--muted)}

  /* Settings */
  .setrow{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--line);gap:14px}
  .setrow:last-child{border-bottom:none}
  .setrow .st{font-weight:600;font-size:14.5px}
  .setrow .sd{font-size:12.5px;color:var(--muted);margin-top:2px}
  .setrow input[type=text]{padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface2);max-width:180px}
  .banner{background:var(--blue-soft);border:1px solid #cfe0e9;color:#2c5a76;border-radius:14px;padding:14px 16px;font-size:13.5px;display:flex;gap:10px;align-items:flex-start}
  .banner .i{font-size:16px}

  /* Fiscal / revenus */
  .wf{padding:8px 22px 20px}
  .wf .r{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .wf .r:last-child{border-bottom:none}
  .wf .r.sub .lbl{padding-left:18px;font-size:13px;color:var(--muted)}
  .wf .r.strong{border-bottom:2px solid var(--line);padding-bottom:11px;margin-bottom:2px}
  .wf .r .lbl{color:var(--ink)}
  .wf .r .v{font-variant-numeric:tabular-nums;font-weight:600}
  .wf .r .v.minus{color:var(--terra)}
  .wf .r.tot{border-top:2px solid var(--ink);margin-top:8px;padding-top:13px;font-weight:700}
  .wf .r.tot .v{font-family:'Fraunces',serif;font-size:23px}
  .brackets{padding:16px 22px 22px}
  .bkbar{display:flex;height:32px;border-radius:9px;overflow:visible;position:relative;background:var(--bg2)}
  .bkseg{position:relative;transition:.5s;height:100%}
  .bkseg:first-child{border-radius:9px 0 0 9px}.bkseg:last-child{border-radius:0 9px 9px 0}
  .bkmark{position:absolute;top:-5px;bottom:-5px;width:3px;background:var(--ink);border-radius:3px;z-index:3;box-shadow:0 0 0 3px var(--surface)}
  .bklegend{display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;font-size:11.5px;color:var(--muted)}
  .bklegend .li{display:flex;align-items:center;gap:6px}
  .bklegend .sw{width:10px;height:10px;border-radius:3px;flex:none}
  .chartbox{padding:16px 16px 18px;overflow-x:auto}
  .barchart{display:flex;align-items:flex-end;gap:5px;height:170px;min-width:340px}
  .barchart .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;min-width:0}
  .barchart .col .bar{width:72%;max-width:24px;border-radius:5px 5px 0 0;min-height:2px;transition:.5s}
  .barchart .col .mlab{font-size:10px;color:var(--muted);text-transform:uppercase}
  .barchart .col .vlab{font-size:9.5px;color:var(--muted);font-weight:600;height:12px}
  .infoNote{font-size:12px;color:var(--muted);padding:4px 8px 0;line-height:1.65}
  .kpi3{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--surface2)}
  .kpi3 .k{padding:14px 12px;text-align:center;border-right:1px solid var(--line)}
  .kpi3 .k:last-child{border-right:none}
  .kpi3 .k .lab{font-size:11.5px;color:var(--muted);font-weight:600}
  .kpi3 .k .val{font-family:'Fraunces',serif;font-size:20px;margin-top:5px}
  .barchart2{display:flex;align-items:flex-end;gap:6px;height:160px;min-width:360px}
  .barchart2 .col2{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px;min-width:0}
  .barchart2 .pair{display:flex;align-items:flex-end;gap:2px;height:130px}
  .barchart2 .b{width:9px;border-radius:4px 4px 0 0;min-height:2px;transition:.5s}
  .barchart2 .binc{background:linear-gradient(180deg,var(--green2),var(--green))}
  .barchart2 .bexp{background:linear-gradient(180deg,#d0704e,var(--terra))}
  .barchart2 .mlab{font-size:10px;color:var(--muted);text-transform:uppercase}
  .wknav{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px 22px 0;flex-wrap:wrap}
  .wknav .wklabel{font-family:'Fraunces',serif;font-size:18px}
  .wkgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:16px 22px 6px}
  @media(max-width:560px){.wkgrid{grid-template-columns:repeat(3,1fr)}}

  for(const [rid,ks] of RAYON_RULES){ if(ks.some(k=>l.includes(k))) return rid; }
  return 'autre';
}
// Protéine dominante d'une recette (pour la variété du menu) — dérivée des ingrédients.
function detectProtein(ings){
  const s=(ings||[]).join(' ').toLowerCase();
  if(/lardon|jambon|\bporc\b|bacon|saucisse|merguez/.test(s)) return 'porc';
  if(/poulet|dinde|volaille/.test(s)) return 'poulet';
  if(/haché|hache|boeuf|bœuf|steak|veau|agneau|boulette/.test(s)) return 'boeuf';
  if(/saumon|poisson|thon|cabillaud|crevette|gambas|colin|truite|scampi|maquereau|sardine/.test(s)) return 'poisson';
  return 'vege';
}

// Normalise/complète un état (utilisé au chargement local ET pour les données reçues du cloud)
function migrate(s){
  if(!s||typeof s!=='object') return DEFAULT_STATE();
  s.ui=s.ui||{month:monthKey(todayISO())};
  (s.members||[]).forEach(m=>{if(m.name==='Augustin')m.name='Gus';if(m.name==='Ma femme')m.name='Ju';});
  if(!Array.isArray(s.members)||s.members.length<2) s.members=DEFAULT_STATE().members;
  if(!Array.isArray(s.categories)) s.categories=DEFAULT_CATS;
  ['expenses','incomes','contributions','recurrents'].forEach(k=>{ if(!Array.isArray(s[k])) s[k]=[]; });
  s.fiscalYear = s.fiscalYear || '2026';
  if(!s.goal||typeof s.goal!=='object') s.goal={monthly:0};
  if(typeof s.goal.monthly!=='number') s.goal.monthly=0;
  if(!Array.isArray(s.activity)) s.activity=[];
  s.couple = Object.assign({quotientConjugal:true}, s.couple||{});
  if(!s.budgets||typeof s.budgets!=='object') s.budgets={};
  if(!s.retro) s.retro={rate:0.30,days:{},cursorWeek:mondayOf(todayISO()),history:[]};
  if(typeof s.retro.rate!=='number') s.retro.rate=0.30;
  if(!s.retro.days||typeof s.retro.days!=='object'){
    s.retro.days={};
    if(Array.isArray(s.retro.weeks)) s.retro.weeks.forEach(w=>{ (w.days||[]).forEach((v,i)=>{ if(v>0) s.retro.days[addDays(w.start,i)]=v; }); });
  }
  if(!s.retro.cursorWeek) s.retro.cursorWeek=mondayOf(todayISO());
  if(!Array.isArray(s.retro.history)) s.retro.history=[];
  delete s.retro.weeks; delete s.retro.cursor;
  // Propriétaire de la rétrocession (Gus par défaut) — reprend l'ancien retroLink si présent
  if(!s.retro.memberId){
    const lk=(s.members||[]).find(m=>s.profils&&s.profils[m.id]&&s.profils[m.id].retroLink);
    s.retro.memberId = lk ? lk.id : ((s.members&&s.members[0]&&s.members[0].id)||'m1');
  }
  if(!s.profils) s.profils={};
  (s.members||[]).forEach((m,i)=>{ s.profils[m.id]=Object.assign({salaireBrut:0,recettes:0,fraisPro:0,statut:i===0?'principal':'complementaire',communal:0.07,enfants:0,va:[0,0,0,0],nouvelIndep:false,retroLink:false}, s.profils[m.id]||{}); if(!Array.isArray(s.profils[m.id].va)) s.profils[m.id].va=[0,0,0,0]; });
  // Repas & courses
  if(!s.meals||typeof s.meals!=='object') s.meals={};
  if(!Array.isArray(s.meals.recipes)) s.meals.recipes=DEFAULT_RECIPES();
  else s.meals.recipes.forEach(r=>{ if(r.meal!=='midi') r.meal='soir'; if(typeof r.veggie!=='boolean') r.veggie=false; if(!Array.isArray(r.ingredients)) r.ingredients=[]; });
  // Top-up additif des recettes par défaut (nouveaux lots), une seule fois par version
  if((s.meals.seededVersion||0) < RECIPE_SEED_VERSION){
    const have=new Set(s.meals.recipes.map(r=>r.id));
    DEFAULT_RECIPES().forEach(r=>{ if(!have.has(r.id)) s.meals.recipes.push(r); });
    s.meals.seededVersion=RECIPE_SEED_VERSION;
  }
  // Deux créneaux (soir/midi) — migre l'ancien format à menu unique
  if(!s.meals.menus||typeof s.meals.menus!=='object') s.meals.menus={soir:Array.isArray(s.meals.menu)?s.meals.menu:[], midi:[]};
  if(!Array.isArray(s.meals.menus.soir)) s.meals.menus.soir=[];
  if(!Array.isArray(s.meals.menus.midi)) s.meals.menus.midi=[];
  if(!s.meals.targets||typeof s.meals.targets!=='object') s.meals.targets={soir:(typeof s.meals.targetEvenings==='number'?s.meals.targetEvenings:7), midi:5};
  if(typeof s.meals.targets.soir!=='number') s.meals.targets.soir=7;
  if(typeof s.meals.targets.midi!=='number') s.meals.targets.midi=5;
  delete s.meals.menu; delete s.meals.targetEvenings;
  if(!s.meals.checked||typeof s.meals.checked!=='object') s.meals.checked={};
  if(!Array.isArray(s.meals.pinned)) s.meals.pinned=[];
  if(!Array.isArray(s.meals.extras)) s.meals.extras=[];
  if(!Array.isArray(s.meals.pantry)) s.meals.pantry=[];
  if(!Array.isArray(s.meals.recent)) s.meals.recent=[];
  if(!s.meals.filters||typeof s.meals.filters!=='object') s.meals.filters={maxTime:0,veggieOnly:false,exclude:''};
  if(typeof s.meals.filters.maxTime!=='number') s.meals.filters.maxTime=0;
  if(typeof s.meals.filters.veggieOnly!=='boolean') s.meals.filters.veggieOnly=false;
  if(typeof s.meals.filters.exclude!=='string') s.meals.filters.exclude='';
  if(typeof s.meals.startDay!=='number') s.meals.startDay=1;
  return s;
}

/* ---------- Sauvegardes automatiques locales (anti-perte de données) ---------- */
const SNAP_KEY='hadeux_snapshots';
function snapshotMaybe(){
  try{
    let snaps=JSON.parse(localStorage.getItem(SNAP_KEY)||'[]');
    const today=todayISO();
    const entry={date:today, ts:Date.now(), data:S};
    if(snaps.length && snaps[snaps.length-1].date===today) snaps[snaps.length-1]=entry; // dernière version du jour
    else snaps.push(entry);
    localStorage.setItem(SNAP_KEY, JSON.stringify(snaps.slice(-10)));
  }catch(e){}
}
function listSnapshots(){ try{ return JSON.parse(localStorage.getItem(SNAP_KEY)||'[]'); }catch(e){ return []; } }
function restoreSnapshot(ts){
  const s=listSnapshots().find(x=>String(x.ts)===String(ts)); if(!s) return;
  S=migrate(JSON.parse(JSON.stringify(s.data))); save(); render(); toast('Sauvegarde restaurée ✓');

/* ---------- Toasts + annulation ---------- */
function toast(msg,opts){
  opts=opts||{};
  let host=document.getElementById('toastHost');
  if(!host){ host=document.createElement('div'); host.id='toastHost'; document.body.appendChild(host); }
  const t=document.createElement('div'); t.className='toast';
  const span=document.createElement('span'); span.textContent=msg; t.appendChild(span);
  let done=false; const close=()=>{ if(done)return; done=true; t.classList.remove('in'); t.classList.add('out'); setTimeout(()=>t.remove(),260); };
  if(opts.actionLabel){ const b=document.createElement('button'); b.className='toast-act'; b.textContent=opts.actionLabel;
    b.onclick=()=>{ try{ opts.onAction&&opts.onAction(); }finally{ close(); } }; t.appendChild(b); }
  host.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('in'));
  setTimeout(close, opts.duration||4800);
  return close;
}
function deleteWithUndo(arrName, id, label){
  const arr=S[arrName]; if(!Array.isArray(arr)) return;
  const idx=arr.findIndex(x=>x.id===id); if(idx<0) return;

  logActivity(`a supprimé ${(label||'un élément').toLowerCase()}${removed&&removed.amount?' · '+EUR(removed.amount):''}`);
  save(); render();
  toast((label||'Élément')+' supprimé', {actionLabel:'Annuler', onAction:()=>{ const a=S[arrName]; a.splice(Math.min(idx,a.length),0,removed); save(); render(); }});
}

function timeAgo(ts){
  const s=Math.max(0,Math.floor((Date.now()-ts)/1000));
  if(s<60) return 'à l\'instant';
  const m=Math.floor(s/60); if(m<60) return `il y a ${m} min`;
  const h=Math.floor(m/60); if(h<24) return `il y a ${h} h`;
  const d=Math.floor(h/24); if(d<7) return `il y a ${d} j`;
  return new Date(ts).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}

/* ============================================================
   SYNCHRO EN LIGNE (Supabase) — activée si CLOUD.url est renseigné.
   Auth par mot de passe partagé + données partagées (1 ligne), sondage.
============================================================ */
let sb=null, cloudReady=false, cloudUser=null, cloudLastTs=null, cloudPushTimer=null;
let cloudSynced=false, cloudLastSyncAt=null;   // cloudSynced : on a confirmé le cloud avant d'écrire (anti-écrasement)
function cloudConfigured(){ return !!(CLOUD.url && CLOUD.anonKey && window.supabase); }
function setSyncStatus(t){ const el=document.getElementById('syncDot'); if(!el) return;
  el.className='syncdot '+t;
  el.title = {synced:'Synchronisé en ligne',saving:'Enregistrement…',offline:'Hors-ligne (données locales)',local:'Mode local'}[t]||''; }
async function initCloud(){
  if(!cloudConfigured()){ setSyncStatus('local'); return; }
  try{
    sb=window.supabase.createClient(CLOUD.url, CLOUD.anonKey, {auth:{persistSession:true,autoRefreshToken:true}});
    wireAuth();
    const {data:{session}}=await sb.auth.getSession();
    if(session){ cloudUser=session.user; await startCloud(); }
    else { document.getElementById('authGate').style.display='flex'; }
    sb.auth.onAuthStateChange((_e,s)=>{ if(s&&!cloudUser){ cloudUser=s.user; startCloud(); } if(!s){ cloudUser=null; cloudReady=false; } });
  }catch(e){ setSyncStatus('offline'); }
}
async function startCloud(){
  cloudReady=true; document.getElementById('authGate').style.display='none';
  await cloudPull(); render();
  setInterval(cloudPull, 6000);
  window.addEventListener('online', cloudPull);
}
async function cloudPull(){
  if(!cloudReady||!sb) return;
  try{
    const {data,error}=await sb.from(CLOUD.table).select('data,updated_at').eq('id',CLOUD.rowId).maybeSingle();
    if(error) throw error;
    if(!data){ cloudSynced=true; await cloudPushNow(); return; }   // aucune donnée cloud : on sème l'état local
    const busy=document.activeElement && /INPUT|SELECT|TEXTAREA/.test(document.activeElement.tagName||'');
    const modalOpen=document.getElementById('overlay').classList.contains('show');
    if(data.updated_at!==cloudLastTs && data.data && !busy && !modalOpen){
      cloudLastTs=data.updated_at; S=migrate(data.data);
      try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch(e){}
      render();
    }
    cloudSynced=true;                 // ✅ on a bien lu le cloud : l'écriture est désormais autorisée
    cloudLastSyncAt=new Date();
    setSyncStatus('synced');
  }catch(e){ setSyncStatus('offline'); }
}
function cloudPush(){
  // Sécurité anti-écrasement : tant qu'on n'a pas confirmé le contenu cloud, on n'écrit PAS
  if(!cloudReady||!sb||!cloudSynced) return;
  setSyncStatus('saving');
  clearTimeout(cloudPushTimer); cloudPushTimer=setTimeout(cloudPushNow, 700);
}
async function cloudPushNow(){
  if(!cloudReady||!sb) return;
  try{
    const ts=new Date().toISOString();
    const {data,error}=await sb.from(CLOUD.table).upsert({id:CLOUD.rowId,data:S,updated_at:ts}).select('updated_at').maybeSingle();
    if(error) throw error;
    cloudLastTs=(data&&data.updated_at)||ts;
    cloudLastSyncAt=new Date();
    setSyncStatus('synced');
  }catch(e){ setSyncStatus('offline'); }
}
function wireAuth(){
  const f=document.getElementById('authForm'); if(!f||!sb) return;

/* -------- Calcul du mois -------- */
function compute(){
  const m1=S.members[0], m2=S.members[1];
  const exp = S.expenses.filter(e=>inMonth(e.date));
  const inc = S.incomes.filter(i=>inMonth(i.date));
  const contr = S.contributions.filter(c=>inMonth(c.date));

  const commune = exp.filter(e=>e.scope==='commune');
  const perso   = exp.filter(e=>e.scope==='perso');

  const totalCommune = sum(commune.map(e=>e.amount));
  const totalPerso   = sum(perso.map(e=>e.amount));
  const totalExp     = totalCommune + totalPerso;

  // Part de m1 sur une dépense commune (défaut 50/50)
  const s1of=e=>{ const s=(e.split!=null?e.split:0.5); return Math.max(0,Math.min(1,s)); };
  // Part de chacun sur l'ensemble des dépenses communes (splits personnalisés pris en compte)
  const partComm={}; S.members.forEach(m=>partComm[m.id]=0);
  commune.forEach(e=>{ const s1=s1of(e); partComm[m1.id]+=e.amount*s1; partComm[m2.id]+=e.amount*(1-s1); });

  // Compte commun : dépenses payées PAR le compte commun
  const potCommune = commune.filter(e=>e.paidBy==='commun');
  const potDepenses = sum(potCommune.map(e=>e.amount));
  const versements = {}; S.members.forEach(m=>versements[m.id]=0);
  contr.forEach(c=>{ if(versements[c.memberId]!=null) versements[c.memberId]+=c.amount; });
  const totalVersements = sum(Object.values(versements));
  const potBalance = totalVersements - potDepenses; // solde du compte commun (ce mois)
  const partPot = potDepenses/2;
  // Part due par chacun sur ce que le compte commun a payé (selon les splits)
  const dueShare={}; S.members.forEach(m=>dueShare[m.id]=0);
  potCommune.forEach(e=>{ const s1=s1of(e); dueShare[m1.id]+=e.amount*s1; dueShare[m2.id]+=e.amount*(1-s1); });

  // Avances : dépenses communes payées de la poche de chacun
  const advance = {}; S.members.forEach(m=>advance[m.id]=0);
  const advCommune = commune.filter(e=>e.paidBy!=='commun');
  advCommune.forEach(e=>{ if(advance[e.paidBy]!=null) advance[e.paidBy]+=e.amount; });
  // Ce que chacun doit à l'autre pour les avances (selon les splits)
  let oweM2toM1=0, oweM1toM2=0;
  advCommune.forEach(e=>{ const s1=s1of(e);
    if(e.paidBy===m1.id) oweM2toM1 += e.amount*(1-s1);   // part de m2, avancée par m1
    else if(e.paidBy===m2.id) oweM1toM2 += e.amount*s1;  // part de m1, avancée par m2
  });
  const advanceNet = oweM2toM1 - oweM1toM2; // >0 : m2 doit à m1

  // Revenus & perso par personne
  const income={}, persoBy={};
  S.members.forEach(m=>{income[m.id]=0;persoBy[m.id]=0;});
  inc.forEach(i=>{ if(income[i.memberId]!=null) income[i.memberId]+=i.amount; });
  perso.forEach(e=>{ const o=e.owner||e.paidBy; if(persoBy[o]!=null) persoBy[o]+=e.amount; });

  const totalIncome = sum(Object.values(income));

  // Règlement compte commun : chacun doit sa part
  const dueToPot = {}; S.members.forEach(m=>dueToPot[m.id]=dueShare[m.id] - versements[m.id]); // >0 : doit verser

  // Position par personne : reste à vivre = revenus - perso - sa part des communes
  const partCommune = totalCommune/2; // moyenne (compat)
  const rest={}; S.members.forEach(m=>rest[m.id]=income[m.id]-persoBy[m.id]-partComm[m.id]);

  return {m1,m2,exp,inc,contr,commune,perso,totalCommune,totalPerso,totalExp,
    potDepenses,versements,totalVersements,potBalance,partPot,dueShare,advance,advanceNet,
    income,persoBy,totalIncome,dueToPot,partCommune,partComm,rest,
    epargne: totalIncome-totalExp};
}
const sum = a => a.reduce((s,x)=>s+(+x||0),0);

/* Totaux d'un mois donné (pour comparaisons) */
function monthTotals(mk){
  const exp=S.expenses.filter(e=>monthKey(e.date)===mk);
  const inc=S.incomes.filter(i=>monthKey(i.date)===mk);
  const byCat={}; exp.forEach(e=>byCat[e.categoryId]=(byCat[e.categoryId]||0)+e.amount);
  const tExp=sum(exp.map(e=>e.amount)), tInc=sum(inc.map(i=>i.amount));
  return {tExp,tInc,epargne:tInc-tExp,byCat};
}
function deltaChip(now,prev,invert){
  if(prev<=0) return '';
  const pct=Math.round((now-prev)/prev*100);
  if(pct===0) return `<span style="color:var(--muted)">= vs mois dernier</span>`;
  const up=pct>0; const good=invert?!up:up;   // pour dépenses, la hausse est "mauvaise"
  const col=good?'var(--green)':'var(--terra)';
  return `<span style="color:${col};font-weight:600">${up?'▲':'▼'} ${Math.abs(pct)}%</span> <span style="color:var(--muted)">vs mois dernier</span>`;
}

function monthMovers(d,prev){
  if(prev.tExp<=0) return '';   // pas de mois précédent à comparer
  const nowByCat={}; d.exp.forEach(e=>nowByCat[e.categoryId]=(nowByCat[e.categoryId]||0)+e.amount);
  const ids=new Set([...Object.keys(nowByCat),...Object.keys(prev.byCat)]);
  const rows=[...ids].map(id=>({id, now:nowByCat[id]||0, was:prev.byCat[id]||0, diff:(nowByCat[id]||0)-(prev.byCat[id]||0)}))
    .filter(r=>Math.abs(r.diff)>=1).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).slice(0,4);
  if(!rows.length) return '';
  return `<div class="card"><h2 class="title">Ce qui bouge vs mois dernier</h2>
    <p class="sub-t">Plus grosses variations par catégorie</p>
    <div class="list">${rows.map(r=>{ const c=cat(r.id); const up=r.diff>0;
      return `<div class="row"><div class="em">${c.e}</div>
        <div class="main"><div class="l1">${esc(c.name)}</div>
          <div class="l2">${EUR0(r.was)} → ${EUR0(r.now)}</div></div>
        <div class="amt" style="color:${up?'var(--terra)':'var(--green)'}">${up?'+':'−'}${EUR0(Math.abs(r.diff))}</div></div>`;
    }).join('')}</div></div>`;
}

        <h2 class="title">Commun vs perso</h2>

function settlementHero(d){
  const parts=[];
  // Compte commun
  S.members.forEach(m=>{
    const due=d.dueToPot[m.id];
    if(due>0.5) parts.push(`<span class="chip">💳 <b>${esc(m.name)}</b> doit verser <b>${EUR(due)}</b> au compte commun</span>`);
  });
  // Avances
  if(Math.abs(d.advanceNet)>0.5){
    const [from,to,amt] = d.advanceNet>0 ? [d.m2,d.m1,d.advanceNet] : [d.m1,d.m2,-d.advanceNet];
    parts.push(`<span class="chip">🔁 <b>${esc(from.name)}</b> rembourse <b>${EUR(amt)}</b> à ${esc(to.name)}</span>`);
  }
  let headline, sub;
  if(parts.length===0){
    if(d.totalCommune===0 && d.totalVersements===0){
      headline=`Ajoutez vos premières dépenses pour voir <b>qui doit quoi</b>.`;
      sub=`Marquez chaque dépense comme commune (partagée 50/50) ou perso.`;
    }else{
      headline=`Tout est équilibré ce mois-ci. <b>Rien à régler</b> ✨`;
      sub=`Vos parts sur les dépenses communes sont à jour.`;
    }
  }else{
    headline=`Pour être à l'équilibre ce mois-ci&nbsp;:`;
    const even = Math.abs(d.partComm[d.m1.id]-d.partComm[d.m2.id])<0.5;
    sub= even
      ? `Dépenses communes du mois : ${EUR(d.totalCommune)} — soit ${EUR(d.partComm[d.m1.id])} par personne.`
      : `Dépenses communes : ${EUR(d.totalCommune)} — part ${esc(d.m1.name)} ${EUR(d.partComm[d.m1.id])} · part ${esc(d.m2.name)} ${EUR(d.partComm[d.m2.id])}.`;
  }
  return `<div class="card hero">
    <div class="eyebrow">Le point du mois</div>
    <div class="headline">${headline}</div>
    <div class="sub">${sub}</div>
    ${parts.length?`<div class="settle-actions">${parts.join('')}</div>`:''}
  </div>`;
}

function stat(k,v,dd,cls){
  return `<div class="card stat"><div class="k">${k}</div>
    <div class="v ${cls}">${v}</div><div class="d">${dd}</div></div>`;
}

function categoryBars(d){
  const map={};
  d.exp.forEach(e=>{ map[e.categoryId]=(map[e.categoryId]||0)+e.amount; });
  const rows=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  const max=Math.max(1,...rows.map(r=>r[1]));
  if(!rows.length) return emptyBox('Aucune dépense ce mois-ci');
  return `<div class="bars">${rows.map(([cid,amt])=>{
    const c=cat(cid);
    return `<div class="bar-row">
      <div class="em">${c.e}</div>
      <div class="info"><div class="top"><span>${esc(c.name)}</span><span class="amt">${EUR(amt)}</span></div>
      <div class="track"><div class="fill" style="width:${amt/max*100}%;background:${c.c}"></div></div></div>
    </div>`;}).join('')}</div>`;
}

function splitDonut(d){
  const cP=d.totalCommune, pP=d.totalPerso, tot=cP+pP;
  if(tot===0) return emptyBox('Rien à afficher');
  const cDeg=cP/tot*360;
  return `<div class="split">
    <div class="donut" style="background:conic-gradient(var(--green) 0 ${cDeg}deg, var(--blue) ${cDeg}deg 360deg)">
      <div class="center"><div><div class="big">${Math.round(cP/tot*100)}%</div><div class="small">commun</div></div></div>
    </div>
    <div class="legend">
      <div class="li"><span class="sw" style="background:var(--green)"></span> Communes <span class="v">${EUR(cP)}</span></div>
      <div class="li"><span class="sw" style="background:var(--blue)"></span> Perso <span class="v">${EUR(pP)}</span></div>
      <div class="li" style="border-top:1px solid var(--line);padding-top:9px;margin-top:2px"><span class="sw" style="background:var(--ink)"></span> Total <span class="v">${EUR(tot)}</span></div>
    </div>
  </div>`;
}

function personCard(d,m){
  const pers=d.persoBy[m.id], part=d.partComm[m.id];
  // Si le profil fiscal est rempli, on utilise le NET mensuel estimé (après impôts & cotisations),
  // sinon on retombe sur les revenus bruts saisis manuellement pour le mois.
  const fisc=computePerson(m.id);
  const useNet = fisc && fisc.entrees>0;
  const inc = useNet ? fisc.net/12 : d.income[m.id];
  const r = inc - pers - part;
  return `<div class="card person">
    <div class="pname"><span class="dot" style="background:${m.color}"></span>${esc(m.name)}</div>
    <div style="margin-top:14px">
      <div class="line"><span class="lbl">${useNet?'Revenu net (est.)':'Revenus saisis'}</span><span class="pos">${EUR(inc)}</span></div>
      <div class="line"><span class="lbl">Dépenses perso</span><span>−${EUR(pers)}</span></div>
      <div class="line"><span class="lbl">Part des communes (50%)</span><span>−${EUR(part)}</span></div>
    </div>
    <div class="rest"><span>Reste à vivre / mois</span><span class="val ${r>=0?'pos':'neg'}">${EUR(r)}</span></div>
  </div>`;
}

      <div class="headline">Revenus nets du foyer : <b>${EUR0(netFoyer)}</b>/an</div>
      <div class="sub">soit <b style="color:#F0C863">${EUR0(netFoyer/12)}/mois</b> à vous deux.${qc.applies?` Quotient conjugal : −${EUR0(qc.saving)} d'impôt.`:''}</div>
    </div>
    <div class="stats">
      ${stat('Net '+esc(m1.name), EUR0(net1/12)+' /mois', EUR0(net1)+' /an','')}
      ${stat('Net '+esc(m2.name), EUR0(net2/12)+' /mois', EUR0(net2)+' /an','')}

      <div class="card">

/* ============================================================
   MOTEUR FISCAL BELGE — revenus 2025 / exercice 2026
============================================================ */
function ippProgressive(base,P){
  let tax=0,prev=0; const detail=[];
  for(const [ceil,rate] of P.brackets){
    const amt = base>prev ? Math.min(base,ceil)-prev : 0;
    tax+=amt*rate; detail.push({rate,amt,from:prev,to:ceil}); prev=ceil;
  }
  return {tax,detail};
}
function marginalRate(base,P){
  if(base<=0) return 0; let prev=0;
  for(const [ceil,rate] of P.brackets){ if(base<=ceil) return rate; prev=ceil; }
  return P.brackets[P.brackets.length-1][1];
}
function cotisationsIndep(revenuNetPro, statut, P){
  if(statut==='aucun'||revenuNetPro<=0) return {cotis:0,gestion:0,total:0,base:0,exonere:statut!=='aucun'};
  let base=revenuNetPro, exonere=false;
  if(statut==='principal'){ base=Math.max(base,P.cotisMinBasePrincipal); }
  else if(statut==='complementaire'){ if(revenuNetPro<P.cotisComplExempt) return {cotis:0,gestion:0,total:0,base:0,exonere:true}; }
  let c=Math.min(base,P.cotisCeil1)*P.cotisRate;
  if(base>P.cotisCeil1) c+=(Math.min(base,P.cotisCeil2)-P.cotisCeil1)*P.cotisRate2;
  const gestion=c*P.cotisGestion;
  return {cotis:c,gestion,total:c+gestion,base,exonere};
}
function childSupp(n,P){
  n=Math.max(0,Math.round(n||0)); if(n<=0) return 0;
  const t=P.enfantsSupp||[0]; if(n<t.length) return t[n];
  return t[t.length-1]+(n-(t.length-1))*(P.enfantSuppPlus||0);
}
function retroYearTotal(year){ let t=0; const d=S.retro&&S.retro.days||{}; for(const k in d){ if(k.slice(0,4)===String(year)) t+=(+d[k]||0); } return t; }
// Mois écoulés de l'année (7 en juillet). Année passée = 12 (complète), année future = 12.
function elapsedMonthsOfYear(year){ const ty=todayISO().slice(0,4), tm=parseInt(todayISO().slice(5,7),10)||12; year=String(year);
  if(year!==ty) return 12; return Math.max(1, tm); }
// Total annuel des entrées d'argent loggées (revenus complémentaires) pour un membre, par type
function entriesYearTotal(mid, kind){ const y=String(S.fiscalYear);
  return sum(S.incomes.filter(i=>i.memberId===mid && (i.date||'').slice(0,4)===y &&
    (kind==='salaire' ? i.kind==='salaire' : (i.kind==='indep'||!i.kind))).map(i=>i.amount)); }
function computePerson(mid, over){
  const P=activeFiscal();
  const pr=Object.assign({salaireBrut:0,recettes:0,fraisPro:0,statut:'principal',communal:P.communal,enfants:0,va:[0,0,0,0],nouvelIndep:false}, S.profils[mid]||{}, over||{});
  const retroLinked = pr.noRetro ? false : !!(S.retro && S.retro.memberId===mid);
  // Projection année pleine : le cumul rétro/entrées (à ce jour) est ramené à 12 mois via les mois écoulés
  const elapsed = retroLinked ? elapsedMonthsOfYear(S.fiscalYear) : 12;
  const factor = 12/elapsed;
  const projected = retroLinked && factor!==1;
  // Revenus complémentaires (entrées loggées) ajoutés à la rétro pour le propriétaire, projetés sur l'année
  const salExtra = retroLinked ? entriesYearTotal(mid,'salaire')*factor : 0;
  const indExtra = retroLinked ? entriesYearTotal(mid,'indep')*factor : 0;
  const salaireBrut = (pr.salaireBrut||0) + salExtra;
  const ssEmp=salaireBrut*P.ssEmploye;
  const salAvantFrais=Math.max(0,salaireBrut-ssEmp);
  const fraisForfait=Math.min(salAvantFrais*P.fraisSalRate, P.fraisSalCap);
  const salImposable=Math.max(0, salAvantFrais-fraisForfait);
  // Rétrocession : si liée, recettes = rétro projetée sur l'année (+ compléments indép), rétro (30%) déductible
  const retroYearRaw=retroLinked ? retroYearTotal(S.fiscalYear) : 0;   // encaissé à ce jour
  const retroYear=retroYearRaw*factor;                                 // projeté année pleine
  const retroDeduc=retroLinked ? retroYear*(S.retro.rate||0) : 0;
  const recettes=retroLinked ? (retroYear + indExtra) : (pr.recettes||0);
  const fraisTotal=(pr.fraisPro||0)+retroDeduc;
  const beneficeAvantCotis=Math.max(0, recettes-fraisTotal);
  const cot=cotisationsIndep(beneficeAvantCotis, pr.statut, P);
  const indepImposable=Math.max(0, beneficeAvantCotis-cot.total);
  const baseImposable=salImposable+indepImposable;
  // Quotient conjugal : transfert fictif d'une part de revenu vers le conjoint (base taxée)
  const qcTransfer=+(pr.qcTransfer||0);
  const baseTax=Math.max(0, baseImposable+qcTransfer);
  const ippBrut=ippProgressive(baseTax,P);
  // Quotité exemptée = base + suppléments enfants, valorisée aux taux des tranches basses
  const quotiteTot=P.quotite+childSupp(pr.enfants,P);
  const reductionMax=ippProgressive(quotiteTot,P).tax;
  const reduction=Math.min(ippBrut.tax, reductionMax);
  const ippApres=Math.max(0, ippBrut.tax-reduction);
  const communalRate=(pr.communal!=null?pr.communal:P.communal);
  const communal=ippApres*communalRate;
  const impotTotal=ippApres+communal;
  // Versements anticipés : majoration sur la part d'impôt liée aux revenus indépendants
  const shareIndep=baseImposable>0 ? indepImposable/baseImposable : 0;
  const va=Array.isArray(pr.va)?pr.va:[0,0,0,0];
  const vaTotal=va.reduce((s,x)=>s+(+x||0),0);
  const baseTaxIndep=ippApres*shareIndep;                 // impôt afférent aux revenus d'indépendant
  const montantRef=P.vaBase*baseTaxIndep;                 // 106% de cet impôt = cible VA
  const majBase=pr.nouvelIndep?0:montantRef*P.majorationRate;
  const avantageVA=va.reduce((s,x,i)=>s+(+x||0)*(P.vaBonif[i]||0),0);
  // Personnes physiques : la majoration n'est due qu'à 90% ; seuil de non-application (100€ ou 0,5%)
  let majoration=Math.max(0, majBase-avantageVA)*(P.majorationPP||1);
  const seuilMaj=Math.max(100, 0.005*baseTaxIndep);
  if(majoration<seuilMaj) majoration=0;
  const majorationBrute=majBase*(P.majorationPP||1);
  const entrees=salaireBrut+recettes;
  const impotAvecMaj=impotTotal+majoration;
  const preleve=ssEmp+cot.total+impotAvecMaj;
  const net=entrees-ssEmp-fraisTotal-cot.total-impotAvecMaj;
  return {pr,ssEmp,salAvantFrais,fraisForfait,salImposable,beneficeAvantCotis,cot,
    retroLinked,retroYear,retroYearRaw,retroDeduc,recettes,fraisTotal,elapsed,factor,projected,
    indepImposable,baseImposable,qcTransfer,baseTax,ippBrut,quotiteTot,reduction,ippApres,communalRate,communal,
    impotTotal,shareIndep,vaTotal,baseTaxIndep,montantRef,majorationBrute,avantageVA,majoration,
    impotAvecMaj,entrees,preleve,net};
}

// Net mensuel estimé à partir des ENTRÉES d'argent réelles (12 mois glissants).
// On passe le total annuel des entrées dans le moteur fiscal → taux net effectif appliqué à chaque mois.
function entriesNetEstimate(mid){
  const months=last12Months(); const perMonth={}; months.forEach(m=>perMonth[m]={sal:0,ind:0});
  S.incomes.filter(i=>i.memberId===mid).forEach(i=>{ const mk=monthKey(i.date); if(perMonth[mk]){ if(i.kind==='salaire') perMonth[mk].sal+=i.amount; else perMonth[mk].ind+=i.amount; } });
  const retroOwner = !!(S.retro && S.retro.memberId===mid);
  if(retroOwner){ months.forEach(m=>{ perMonth[m].ind += retroMonthTotal(m); }); }  // rétro + compléments (réel du mois)
  let salY=0, indY=0; months.forEach(m=>{ salY+=perMonth[m].sal; indY+=perMonth[m].ind; });
  const brutY=salY+indY;
  if(brutY<=0) return {empty:true, months, perMonth};
  // Taux net effectif = net / brut de l'estimation ANNUELLE (déjà projetée sur les mois écoulés)
  const r=computePerson(mid);
  const rate = r.entrees>0 ? r.net/r.entrees : 0;
  const nMonths=months.filter(m=>(perMonth[m].sal+perMonth[m].ind)>0).length || 1;
  return {empty:false, months, perMonth, brutY, nMonths, annBasis:r.entrees, annNet:r.net, rate, projected:r.projected, elapsed:r.elapsed};
}

  </div>`;

// Quotient conjugal — présenté comme une économie d'impôt au niveau du COUPLE
// (le QC répartit l'impôt entre conjoints ; on ne distord pas le net individuel).
function quotientConjugalInfo(){
  if(!S.couple || !S.couple.quotientConjugal) return {applies:false};
  const a=S.members[0], b=S.members[1];
  const ra=computePerson(a.id), rb=computePerson(b.id);
  const total=ra.baseImposable+rb.baseImposable; if(total<=0) return {applies:false};
  const lowIsA = ra.baseImposable<=rb.baseImposable;
  const low = lowIsA?ra.baseImposable:rb.baseImposable;
  if(low >= 0.30*total) return {applies:false};       // conjoint le moins payé ≥ 30% → pas de QC
  const P=activeFiscal();
  const transfer=Math.min(0.30*total-low, P.quotientCap); if(transfer<=1) return {applies:false};
  const lowId=lowIsA?a.id:b.id, highId=lowIsA?b.id:a.id;
  const taxSans = ra.impotAvecMaj + rb.impotAvecMaj;
  const taxAvec = computePerson(lowId,{qcTransfer:+transfer}).impotAvecMaj
                + computePerson(highId,{qcTransfer:-transfer}).impotAvecMaj;
  return {applies:true, transfer, lowName:member(lowId)?.name, highName:member(highId)?.name,
    saving: Math.max(0, taxSans-taxAvec)};
}

function waterfall(r,pr){
  const rows=[];
  if(pr.salaireBrut>0){
    rows.push(['💼 Salaire brut', r.pr.salaireBrut, '',false]);
    rows.push(['Cotisations sociales (13,07%)', -r.ssEmp, 'sub',true]);
    rows.push(['Frais forfaitaires', -r.fraisForfait, 'sub',true]);
  }
  if(r.recettes>0){
    rows.push([`🩺 Recettes indépendant${r.retroLinked?' (rétro)':''}`, r.recettes, '',false]);
    if(r.retroDeduc>0) rows.push([`Rétrocession cabinet (${(S.retro.rate*100).toFixed(0)}%, déductible)`, -r.retroDeduc, 'sub',true]);
    if(pr.fraisPro>0) rows.push([r.retroLinked?'Autres frais pro':'Frais professionnels réels', -r.pr.fraisPro, 'sub',true]);
    rows.push([`Cotisations sociales indép.${r.cot.exonere?' (exonéré)':''}`, -r.cot.total, 'sub',true]);
  }
  rows.push(['📊 Base imposable', r.baseImposable, 'strong',false]);
  if(r.qcTransfer) rows.push([r.qcTransfer>0?'Quotient conjugal (part reçue)':'Quotient conjugal (part transférée)', r.qcTransfer, 'sub', r.qcTransfer<0]);
  rows.push(['Impôt (IPP par tranches)', -r.ippBrut.tax, 'sub',true]);
  rows.push([`Quotité exemptée${pr.enfants>0?` (+ ${pr.enfants} enfant${pr.enfants>1?'s':''})`:''}`, +r.reduction, 'sub',false]);
  rows.push([`Taxe communale (${(r.communalRate*100).toFixed(1)}%)`, -r.communal, 'sub',true]);
  if(r.majoration>0) rows.push(['Majoration (VA insuffisants)', -r.majoration, 'sub',true]);
  return `<div class="wf">
    ${rows.map(([l,v,cls,minus])=>`<div class="r ${cls==='sub'?'sub':''} ${cls==='strong'?'strong':''}">
      <span class="lbl">${cls==='strong'?`<b>${l}</b>`:l}</span>
      <span class="v ${minus?'minus':''} ${v>=0&&cls!=='sub'?'':''}">${v<0?'−':(cls==='sub'&&v>0?'+':'')}${EUR(Math.abs(v))}</span></div>`).join('')}
    <div class="r tot"><span class="lbl">Net en poche / an</span><span class="v pos">${EUR(r.net)}</span></div>
    <div class="r" style="border:none;padding-top:4px"><span class="lbl" style="font-size:12.5px">soit par mois</span><span class="v">${EUR(r.net/12)}</span></div>
  </div>`;
}

function bracketBar(r,P,marg){
  const bt=(r.baseTax!=null?r.baseTax:r.baseImposable);
  const MAX=Math.max(P.brackets[2][0]*1.2, bt*1.12);
  const cols=['#8FB9A8','#C9A24B','#D98A5A','#BF5A34'];
  let prev=0; const segs=P.brackets.map(([ceil,rate],i)=>{
    const top=isFinite(ceil)?ceil:MAX; const w=(Math.min(top,MAX)-prev)/MAX*100; prev=top;
    const used = marg===rate;
    return `<div class="bkseg" style="width:${w}%;background:${cols[i]};opacity:${bt>0&&(P.brackets[i][0]<=bt||used)?1:.4}" title="${(rate*100)}%"></div>`;
  }).join('');
  const markPct=Math.min(bt,MAX)/MAX*100;
  const b=P.brackets;
  const leg=[`25% (0–${(b[0][0]/1000).toFixed(1)}k)`,`40% (–${(b[1][0]/1000).toFixed(1)}k)`,`45% (–${(b[2][0]/1000).toFixed(1)}k)`,'50% (+)'];
  return `<div class="brackets">
    <div class="bkbar">${segs}${bt>0?`<div class="bkmark" style="left:${markPct}%"></div>`:''}</div>
    <div style="margin-top:14px;font-size:14px">Base taxée <b>${EUR(bt)}</b> → tranche marginale <b style="color:${cols[[0.25,0.40,0.45,0.50].indexOf(marg)]||'#BF5A34'}">${(marg*100)|0}%</b></div>
    <div class="bklegend">
      ${leg.map((l,i)=>`<span class="li"><span class="sw" style="background:${cols[i]}"></span>${l}</span>`).join('')}
    </div>
  </div>`;
}

function ymKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function last12Months(){
  const [y,m]=curMonth().split('-').map(Number); const out=[];
  for(let i=11;i>=0;i--){ out.push(ymKey(new Date(y, m-1-i, 1))); }
  return out;
}
function fluctuationChart(mid,color,fromRetro){
  const months=last12Months(); const byM={};
  if(fromRetro){ const d=S.retro&&S.retro.days||{}; for(const k in d){ const mk=monthKey(k); byM[mk]=(byM[mk]||0)+(+d[k]||0); } }
  S.incomes.filter(i=>i.memberId===mid).forEach(i=>{const k=monthKey(i.date); byM[k]=(byM[k]||0)+i.amount;}); // compléments (et entrées si non-propriétaire)
  const vals=months.map(k=>byM[k]||0); const max=Math.max(1,...vals);
  if(vals.every(v=>v===0)) return `<div class="empty" style="padding:34px"><p>${fromRetro?'Aucune saisie de rétrocession ni de complément sur ces 12 mois.':'Aucune entrée enregistrée. Ajoute les revenus mensuels pour voir la courbe.'}</p></div>`;
  return `<div class="chartbox"><div class="barchart">${months.map((k,i)=>{
    const v=vals[i]; const h=v/max*120;
    const lab=new Date(k+'-01T12:00').toLocaleDateString('fr-FR',{month:'narrow'});
    return `<div class="col" title="${k} : ${EUR(v)}">
      <div class="vlab">${v?EUR0(v):''}</div>
      <div class="bar" style="height:${h}px;background:linear-gradient(180deg,${color},${shade(color,-20)})"></div>
      <div class="mlab">${lab}</div></div>`;
  }).join('')}</div></div>`;
}
function monthlyIncomeList(mid){
  const list=S.incomes.filter(i=>i.memberId===mid).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);
  if(!list.length) return '';
  return `<div class="list" style="border-top:1px solid var(--line)">${list.map(i=>`<div class="row">
    <div class="em">💰</div><div class="main"><div class="l1">${esc(i.label||'Revenu')}</div>
    <div class="l2">${fmtDate(i.date)} · ${i.kind==='indep'?'Indépendant':'Salaire'}</div></div>
    <div class="amt pos">${EUR(i.amount)}</div>
    <button class="iconbtn" data-edit-inc="${i.id}" title="Modifier">✎</button>
    <button class="del" data-del-inc="${i.id}">✕</button></div>`).join('')}</div>`;
}
function shade(hex,pct){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,Math.min(255,r+pct));g=Math.max(0,Math.min(255,g+pct));b=Math.max(0,Math.min(255,b+pct));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* ---------- RÉTROCESSION CABINET ---------- */
const RETRO_MIN = '2026-01-01';              // le calendrier commence à janvier 2026
const RETRO_MIN_MONTH = '2026-01';
function retroMinWeek(){ return mondayOf(RETRO_MIN); }
function retroWeekMonth(cw){ return monthKey(addDays(cw,3)); } // mois du jeudi (convention ISO)
function retroMonthTotal(mk){ let t=0; const d=S.retro.days||{}; for(const k in d){ if(monthKey(k)===mk) t+=(+d[k]||0); } return t; }
function monthLabelFr(mk){ return new Date(mk+'-01T12:00').toLocaleDateString('fr-FR',{month:'long',year:'numeric'}); }
function validerRetroMois(mk){
  const R=S.retro; const total=retroMonthTotal(mk);
  if(total<=0) return false;
  const retro=total*R.rate;
  R.history=R.history.filter(h=>h.month!==mk);
  R.history.unshift({month:mk, label:monthLabelFr(mk), total, rate:R.rate, retro, validatedAt:todayISO()});
  R.history.sort((a,b)=>(b.month||'').localeCompare(a.month||''));
  save(); return true;
}
function renderRetro(){
  const R=S.retro;
  const minW=retroMinWeek();
  let cw=R.cursorWeek||mondayOf(todayISO());
  if(cw<minW){ cw=minW; R.cursorWeek=cw; }
  const dayNames=['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
  const wdates=[0,1,2,3,4].map(i=>addDays(cw,i));
  const weekTotal=sum(wdates.map(d=>R.days[d]||0));
  const mk=retroWeekMonth(cw);
  const monthTot=retroMonthTotal(mk);
  const retro=monthTot*R.rate;
  const mName=monthLabelFr(mk);
  const validated=R.history.find(h=>h.month===mk);
  const atMinWeek = monthKey(addDays(cw,-4)) < RETRO_MIN_MONTH;   // reculer d'une semaine sortirait de janvier 2026
  const atMinMonth = mk <= RETRO_MIN_MONTH;
  return `<section class="view grid">
    <div class="card hero">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
        <div class="eyebrow">Rétrocession cabinet · ${esc(mName)}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <span class="chip">Rétro de&nbsp;<select data-retroowner style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:3px 6px;font-weight:700">${S.members.map(mm=>`<option value="${mm.id}" ${S.retro.memberId===mm.id?'selected':''} style="color:#000">${esc(mm.name)}</option>`).join('')}</select></span>
          <span class="chip">Taux&nbsp;<input type="number" step="1" min="0" max="100" value="${+(R.rate*100).toFixed(2)}" data-retrorate style="width:52px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:3px 6px;font-weight:700;text-align:right">&nbsp;%</span>
        </div>
      </div>
      <div class="headline">Rétro de ${esc(mName)} : <b>${EUR0(retro)}</b></div>
      <div class="sub">sur <b style="color:#F0C863">${EUR0(monthTot)}</b> de revenus kiné · ${(R.rate*100).toFixed(0)}% reversés au cabinet.${validated?` <span style="opacity:.8">✓ validé le ${fmtDay(validated.validatedAt)}</span>`:''}</div>
    </div>

    <div class="card">
      <div class="wknav">
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn ghost sm" data-retro="prevmonth" ${atMinMonth?'disabled style="opacity:.4;cursor:default"':''}>« Mois</button>
          <button class="btn ghost sm" data-retro="prev" ${atMinWeek?'disabled style="opacity:.4;cursor:default"':''}>‹ Sem.</button>
        </div>
        <div class="wklabel">Semaine du ${fmtDay(cw)} au ${fmtDay(addDays(cw,4))}</div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn ghost sm" data-retro="next">Sem. ›</button>
          <button class="btn ghost sm" data-retro="nextmonth">Mois »</button>
        </div>
      </div>
      <div class="wkgrid">
        ${dayNames.map((n,i)=>{ const dis=wdates[i]<RETRO_MIN; return `<div class="day"><label>${n}<br><span style="font-weight:400;font-size:10px">${fmtDay(wdates[i])}</span></label>
          <div class="amount-input"><input type="number" step="10" min="0" value="${R.days[wdates[i]]||''}" data-retrodate="${wdates[i]}" placeholder="${dis?'—':'0'}" ${dis?'disabled style="opacity:.4"':''}><span class="cur">€</span></div></div>`; }).join('')}
      </div>
      <div style="padding:2px 22px 4px;display:flex;justify-content:space-between;font-weight:700"><span>Total de la semaine</span><span>${EUR(weekTotal)}</span></div>

const FREQS=[[1,'Mensuel'],[3,'Trimestriel'],[6,'Semestriel'],[12,'Annuel'],[24,'Tous les 2 ans']];
function freqLabel(f){ const x=FREQS.find(a=>a[0]===f); return x?x[1]:('Tous les '+f+' mois'); }

function computePrev(){
  const list=(S.recurrents||[]).slice();
  const mm=x=>(x.amount||0)/(x.freq||1);
  let commMonth=0, commYear=0; const persoMonth={}; S.members.forEach(m=>persoMonth[m.id]=0);
  list.forEach(x=>{
    if(x.scope==='perso'){ const o=x.owner||S.members[0].id; persoMonth[o]=(persoMonth[o]||0)+mm(x); }
    else { commMonth+=mm(x); commYear+=(x.amount||0)*(12/(x.freq||1)); }
  });
  const totalMonth = commMonth + Object.values(persoMonth).reduce((s,x)=>s+x,0);
  return {list,commMonth,commYear,persoMonth,totalMonth};
}

// Prochaine occurrence d'une charge à partir de sa date d'échéance et de sa fréquence
function nextOccurrence(x){
  if(!x.nextDue) return null;
  const today=new Date(todayISO()+'T12:00');
  let d=new Date(x.nextDue+'T12:00'); if(isNaN(d)) return null;
  const freq=x.freq||1; let guard=0;
  while(d<today && guard<800){ d=new Date(d.getFullYear(), d.getMonth()+freq, d.getDate()); guard++; }
  return d;
}
function upcomingCharges(days){
  const today=new Date(todayISO()+'T12:00');
  const limit=new Date(today.getFullYear(),today.getMonth(),today.getDate()+ (days||90));
  return (S.recurrents||[]).map(x=>{ const d=nextOccurrence(x); return d?{x,date:d}:null; })
    .filter(Boolean).filter(o=>o.date<=limit)
    .sort((a,b)=>a.date-b.date);
}

/* ============================================================
   REPAS & LISTE DE COURSES
============================================================ */
function recipeById(id){ return (S.meals.recipes||[]).find(r=>r.id===id); }

// Filtres de génération (temps max, végé only, ingrédients exclus)
function recipePassesFilters(r){
  const f=S.meals.filters||{};
  if(f.veggieOnly && !r.veggie) return false;
  if(f.maxTime>0 && (r.time||0)>f.maxTime) return false;
  const ex=(f.exclude||'').toLowerCase().split(/[,;]+/).map(s=>s.trim()).filter(Boolean);
  if(ex.length){ const hay=((r.name||'')+' '+(r.ingredients||[]).join(' ')).toLowerCase(); if(ex.some(t=>hay.includes(t))) return false; }
  return true;
}
// Génère un menu équilibré pour un créneau (soir|midi) couvrant ~`target` repas :
// - conserve les plats ÉPINGLÉS déjà présents,
// - défavorise les plats des semaines RÉCENTES,
// - respecte les FILTRES actifs,
// - variété des protéines, alternance végé/non-végé, « ×2 jours » = 2 repas.
function generateMenu(slot, target){
  const inSlot=r=>(r.meal||'soir')===slot;
  const pinned=S.meals.pinned||[];
  const recent=S.meals.recent||[];
  // Plats épinglés déjà dans ce créneau : on les garde tels quels
  const chosen=[...new Set((S.meals.menus[slot]||[]).filter(id=>pinned.includes(id) && recipeById(id) && inSlot(recipeById(id))))];
  const usedIds=new Set(chosen);
  const protCount={}; let lastProt=null, lastVeg=null; let vegC=0, nonVegC=0, evenings=0;
  chosen.forEach(id=>{ const r=recipeById(id); if(!r) return; const p=detectProtein(r.ingredients||[]);
    protCount[p]=(protCount[p]||0)+1; lastProt=p; lastVeg=r.veggie; if(r.veggie)vegC++; else nonVegC++; evenings+=r.twoDays?2:1; });
  let pool=(S.meals.recipes||[]).filter(r=>inSlot(r)&&!usedIds.has(r.id)&&recipePassesFilters(r));
  while(evenings<target && pool.length){
    let best=null, bestScore=-1e9, bestIdx=-1;
    pool.forEach((r,idx)=>{
      const prot=detectProtein(r.ingredients||[]);
      let sc=Math.random()*0.6;                              // aléa (départage)
      sc -= (protCount[prot]||0)*1.3;                        // variété des protéines sur la semaine
      if(prot===lastProt && prot!=='vege') sc -= 2.2;        // jamais la même viande deux soirs de suite
      if(r.veggie===lastVeg) sc -= 0.8;                      // alterner végé / non-végé
      if(r.veggie && vegC>nonVegC) sc -= 0.7;                // équilibre global du ratio
      if(!r.veggie && nonVegC>vegC) sc -= 0.7;
      const ri=recent.indexOf(r.id); if(ri>=0) sc -= (ri<6?1.8:0.9);  // plats récemment servis défavorisés
      if(sc>bestScore){ bestScore=sc; best=r; bestIdx=idx; }
    });
    chosen.push(best.id);
    pool.splice(bestIdx,1);
    const prot=detectProtein(best.ingredients||[]);
    protCount[prot]=(protCount[prot]||0)+1;
    lastProt=prot; lastVeg=best.veggie;
    if(best.veggie) vegC++; else nonVegC++;
    evenings += best.twoDays?2:1;
  }
  return chosen;
}
// Répartit les plats du menu sur les jours de la semaine (un « ×2 jours » couvre 2 jours)
const JOURS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
function dayPlan(menu, startDay){
  const out=[]; let d=(startDay-1)%7; if(d<0) d+=7;
  menu.forEach(r=>{ const span=r.twoDays?2:1; const from=d; const to=(d+span-1)%7;
    out.push({r, from, to, span}); d=(d+span)%7; });
  return out;
}
function dayLabel(p){ return p.span>1 ? `${JOURS[p.from].slice(0,3)}–${JOURS[p.to].slice(0,3)}` : JOURS[p.from].slice(0,3); }
function swapMeal(slot,i){
  const menu=S.meals.menus[slot]||[];
  const used=new Set(menu);
  const cands=(S.meals.recipes||[]).filter(r=>(r.meal||'soir')===slot && !used.has(r.id));
  if(!cands.length){ toast('Toutes tes recettes de ce créneau sont déjà au menu.'); return; }
  // Préfère une protéine différente des plats voisins
  const cur=menu.map(recipeById).filter(Boolean);
  const neighbours=[cur[i-1],cur[i+1]].filter(Boolean).map(r=>detectProtein(r.ingredients||[]));
  const diff=cands.filter(r=>!neighbours.includes(detectProtein(r.ingredients||[])));
  const from=diff.length?diff:cands;
  menu[i]=from[Math.floor(Math.random()*from.length)].id;
  save(); render();
}

// Clé de regroupement d'un ingrédient (accents, quantités et pluriels neutralisés)
const COMBINING_MARKS = new RegExp('[\\u0300-\\u036f]','g');   // accents décomposés (NFD)
function noAccent(s){ return String(s||'').normalize('NFD').replace(COMBINING_MARKS,'').toLowerCase(); }
function ingKey(raw){
  return String(raw||'').toLowerCase()
    .normalize('NFD').replace(COMBINING_MARKS,'')        // accents
    .replace(/[×x]\s*\d+/g,' ')                          // « ×2 », « x1 »
    .replace(/\d+\s*(g|kg|cl|ml|l)\b/g,' ')              // « 750g »
    .replace(/\d+/g,' ')
    .replace(/[^a-z ]/g,' ')
    .replace(/s\b/g,'')                                  // pluriels simples
    .replace(/\s+/g,' ').trim();
}
function buildShoppingList(){
  const ids=[].concat(S.meals.menus.soir||[], S.meals.menus.midi||[]);
  const menu=ids.map(recipeById).filter(Boolean);
  const map={};
  menu.forEach(r=>{
    (r.ingredients||[]).forEach(raw=>{
      const key=ingKey(raw); if(!key) return;
      if(!map[key]) map[key]={label:raw, rayon:guessRayon(raw), recipes:new Set()};
      // Garde le libellé le plus détaillé (le plus long)
      if(String(raw).length>String(map[key].label).length) map[key].label=raw;
      map[key].recipes.add(r.name);
    });
  });
  return map;
}
// Liste unifiée : ingrédients des recettes + articles libres, avec info garde-manger
function shoppingItems(){
  const shop=buildShoppingList(); const pantry=new Set(S.meals.pantry||[]);
  const items=[];
  Object.keys(shop).forEach(k=>items.push({key:k,label:shop[k].label,rayon:shop[k].rayon,count:shop[k].recipes.size,isExtra:false,hidden:pantry.has(k)}));
  (S.meals.extras||[]).forEach(x=>items.push({key:'x:'+x.id,label:x.label,rayon:x.rayon||guessRayon(x.label),count:0,isExtra:true,id:x.id,hidden:false}));
  return items;
}

function mealTags(r,showSlot){
  const insp = r.inspiration ? '<span class="mealtag insp">✨ Idée</span>' : '';
  const slot = showSlot ? (r.meal==='midi'?'<span class="mealtag">☀️ Midi</span>':'<span class="mealtag">🌙 Soir</span>') : '';
  const veg = r.veggie
    ? '<span class="mealtag veg">🌱 Végé</span>'
    : '<span class="mealtag nonveg">🍖 Non végé</span>';
  const two = r.twoDays ? '<span class="mealtag">×2 jours</span>' : '<span class="mealtag">1 repas</span>';
  const t   = r.time ? `<span class="mealtag">⏱ ${r.time} min</span>` : '';
  return insp+slot+veg+two+t;
}

// Un plat dans « Ma semaine » (mode liste ou jour), avec pin / voir / actions
function mealItemHtml(r,i,mode,dayBadge){
  const pinned=(S.meals.pinned||[]).includes(r.id);
  const open=!!MEAL_OPEN[r.id];
  const detail=open?`<div class="mealdetail">
    <div><b>Ingrédients :</b> ${(r.ingredients||[]).map(esc).join(', ')||'—'}</div>
    ${r.steps?`<div style="margin-top:6px;white-space:pre-line"><b>Préparation :</b>\n${esc(r.steps)}</div>`:'<div style="margin-top:6px;opacity:.7">Pas d’étapes renseignées — ajoute-les via ✎ dans l’onglet Recettes.</div>'}
  </div>`:'';
  const pinBtn=`<button class="iconbtn ${pinned?'pinned':''}" data-mealpin="${r.id}" title="${pinned?'Épinglé — conservé à la régénération':'Épingler (garder ce plat)'}">${pinned?'📌':'📍'}</button>`;
  const openBtn=`<button class="iconbtn" data-mealopen="${r.id}" title="Voir la recette">${open?'▴':'▾'}</button>`;
  const actions = mode==='day'
    ? `${openBtn}${pinBtn}<button class="iconbtn" data-mealup="${i}" title="Monter">↑</button><button class="iconbtn" data-mealdown="${i}" title="Descendre">↓</button>`
    : `${openBtn}${pinBtn}<button class="iconbtn" data-mealswap="${i}" title="Remplacer ce plat">↻</button><button class="iconbtn danger" data-mealdel="${i}" title="Retirer du menu">✕</button>`;
  return `<div class="mealitem">
    <div class="row">
      ${dayBadge?`<span class="daybadge">${dayBadge}</span>`:''}
      <div class="em">${r.emoji||'🍽️'}</div>
      <div class="main"><div class="l1">${esc(r.name)}</div>
        <div class="l2" style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px">${mealTags(r)}</div></div>
      ${actions}
    </div>${detail}</div>`;
}

function emptyState(ic,t,s){return `<div class="empty"><div class="big">${ic}</div><h3 style="font-size:17px;color:var(--ink)">${t}</h3><p>${s}</p></div>`;}
function emptyBox(t){return `<div class="empty" style="padding:34px"><p>${t}</p></div>`;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function formRetroValider(){
  const R=S.retro; const mk=retroWeekMonth(R.cursorWeek); const total=retroMonthTotal(mk); const retro=total*R.rate;
  const mName=monthLabelFr(mk);
  // détail par semaine du mois
  const weeks={}; for(const d in R.days){ if(monthKey(d)===mk && R.days[d]>0){ const wm=mondayOf(d); weeks[wm]=(weeks[wm]||0)+R.days[d]; } }
  const wkeys=Object.keys(weeks).sort();
  return `<div class="mhead"><h2 style="text-transform:capitalize">Valider ${esc(mName)}</h2><button class="x" data-close>✕</button></div>
  <div style="padding:6px 24px 24px">

    <div class="wf" style="padding:10px 0 6px">
      <div class="r tot"><span class="lbl">Total revenus du mois</span><span class="v">${EUR(total)}</span></div>

function wireModal(type){
  const M=document.getElementById('modal');
  M.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal);
  // segmented pickers
  M.querySelectorAll('#segScope button').forEach(b=>b.onclick=()=>{
    modalDraft.scope=b.dataset.scope;
    M.querySelectorAll('#segScope button').forEach(x=>x.classList.toggle('on',x===b));
    const pf=M.querySelector('#payerField');
    if(pf) pf.style.display = modalDraft.scope==='perso' ? 'none' : 'block';
  });
  M.querySelectorAll('#segPayer button').forEach(b=>b.onclick=()=>{
    modalDraft.paidBy=b.dataset.pay;
    M.querySelectorAll('#segPayer button').forEach(x=>x.classList.toggle('on',x===b));
  });
  M.querySelectorAll('#segMember button').forEach(b=>b.onclick=()=>{
    modalDraft.memberId=b.dataset.mem;
    M.querySelectorAll('#segMember button').forEach(x=>x.classList.toggle('on',x===b));
  });
  M.querySelectorAll('#segKind button').forEach(b=>b.onclick=()=>{
    modalDraft.kind=b.dataset.kind;
    M.querySelectorAll('#segKind button').forEach(x=>x.classList.toggle('on',x===b));
  });
  M.querySelectorAll('#catGrid button').forEach(b=>b.onclick=()=>{
    modalDraft.categoryId=b.dataset.cat;
    M.querySelectorAll('#catGrid button').forEach(x=>x.classList.toggle('on',x===b));
  });
  const retroC=M.querySelector('#retroConfirm');
  if(retroC) retroC.onclick=()=>{ if(validerRetroMois(retroC.dataset.mk)){ closeModal(); render(); } };
  // Recette : toggles moment/végé + soumission + suppression
  M.querySelectorAll('#segMeal button').forEach(b=>b.onclick=()=>{
    modalDraft.meal=b.dataset.meal;
    M.querySelectorAll('#segMeal button').forEach(x=>x.classList.toggle('on',x===b));
  });
  M.querySelectorAll('#segVeg button').forEach(b=>b.onclick=()=>{
    modalDraft.veggie=b.dataset.veg==='1';
    M.querySelectorAll('#segVeg button').forEach(x=>x.classList.toggle('on',x===b));
  });
  const fr=M.querySelector('#frmRecette');
  if(fr) fr.onsubmit=e=>{
    e.preventDefault();
    const name=M.querySelector('#r_name').value.trim(); if(!name) return;
    const emoji=M.querySelector('#r_emoji').value.trim()||'🍽️';
    const time=Math.max(0,parseInt(M.querySelector('#r_time').value)||0);
    const twoDays=M.querySelector('#r_2j').value==='1';
    const veggie=!!modalDraft.veggie;
    const meal=modalDraft.meal==='midi'?'midi':'soir';
    const ingredients=M.querySelector('#r_ings').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const steps=(M.querySelector('#r_steps')?.value||'').trim();
    if(modalDraft.editId){
      const r=recipeById(modalDraft.editId);
      if(r) Object.assign(r,{name,emoji,time,twoDays,veggie,meal,ingredients,steps});
    }else{
      S.meals.recipes.push({id:'r_'+uid(),name,emoji,time,twoDays,veggie,meal,ingredients,steps});
    }
    save(); closeModal(); render();
  };
  const rdel=M.querySelector('#recDelBtn');
  if(rdel) rdel.onclick=()=>{ if(confirm('Supprimer cette recette ?')){
    S.meals.recipes=S.meals.recipes.filter(r=>r.id!==modalDraft.editId);
    S.meals.menus.soir=(S.meals.menus.soir||[]).filter(id=>id!==modalDraft.editId);
    S.meals.menus.midi=(S.meals.menus.midi||[]).filter(id=>id!==modalDraft.editId);
    save(); closeModal(); render(); } };
  const _frm=M.querySelector('#frm'); if(_frm) _frm.onsubmit=e=>{
    e.preventDefault();
    const amount=parseFloat(M.querySelector('#f_amount').value);
    if(!(amount>0)) return;
    const label=M.querySelector('#f_label')?.value.trim()||'';
    const date=M.querySelector('#f_date')?.value||todayISO();
    const recurring=M.querySelector('#f_rec')?.value==='yes';
    const eid=modalDraft.editId;
    const upd=(arr,rec)=>{ if(eid){ const x=arr.find(e=>e.id===eid); if(x) Object.assign(x,rec); } else arr.push(Object.assign({id:uid()},rec)); };
    if(type==='depense'){
      const scope=modalDraft.scope;
      upd(S.expenses,{amount,label,date,categoryId:modalDraft.categoryId,scope,
        paidBy: scope==='perso'?modalDraft.memberId:modalDraft.paidBy,
        owner: scope==='perso'?modalDraft.memberId:null, recurring,
        split: scope==='commune'?(modalDraft.split!=null?modalDraft.split:0.5):null});
    }else if(type==='revenu'){
      upd(S.incomes,{amount,label,date,memberId:modalDraft.memberId,kind:modalDraft.kind||'salaire',recurring});
    }else if(type==='versement'){
      upd(S.contributions,{amount,label,date,memberId:modalDraft.memberId});
    }else if(type==='recurrent'){
      const freq=parseInt(M.querySelector('#f_freq')?.value)||12;
      const scope=modalDraft.scope||'commune';
      const nextDue=M.querySelector('#f_nextdue')?.value||null;
      upd(S.recurrents,{label,amount,freq,scope,categoryId:modalDraft.categoryId,
        owner: scope==='perso'?modalDraft.memberId:null, nextDue});
    }
    const tl={depense:'une dépense',revenu:'une entrée',versement:'un versement',recurrent:'une charge'}[type]||'une entrée';
    logActivity(`${eid?'a modifié':'a ajouté'} ${tl} · ${EUR(amount)}${label?' ('+esc(label)+')':''}`);
    save(); closeModal(); render();
    if(eid) toast('Modifié ✓');
  };
  // Dépense : synchronise payeur + split selon le type (commune/perso)
  if(type==='depense'){
    const m1=S.members[0];
    const syncPayer=()=>{
      const pf=M.querySelector('#payerField'), sp=M.querySelector('#segPayer'), sf=M.querySelector('#splitField');
      const scope=modalDraft.scope;
      if(scope==='perso'){
        pf.style.display='block'; pf.querySelector('label').textContent='Dépense de';
        if(!S.members.some(m=>m.id===modalDraft.paidBy)) modalDraft.paidBy=modalDraft.memberId||m1.id;
        modalDraft.memberId=modalDraft.paidBy;
        sp.innerHTML=S.members.map(m=>`<button type="button" data-pay="${m.id}" class="${modalDraft.paidBy===m.id?'on':''}">${esc(m.name)}</button>`).join('');
        if(sf) sf.style.display='none';
      }else{
        pf.style.display='block'; pf.querySelector('label').textContent='Payée par';
        if(modalDraft.paidBy!=='commun' && !S.members.some(m=>m.id===modalDraft.paidBy)) modalDraft.paidBy='commun';
        sp.innerHTML=`<button type="button" data-pay="commun" class="${modalDraft.paidBy==='commun'?'on':''}">◈ Compte commun</button>`+S.members.map(m=>`<button type="button" data-pay="${m.id}" class="${modalDraft.paidBy===m.id?'on':''}">${esc(m.name)}</button>`).join('');
        if(sf) sf.style.display='block';
      }
      sp.querySelectorAll('button').forEach(b=>b.onclick=()=>{ modalDraft.paidBy=b.dataset.pay; if(modalDraft.scope==='perso') modalDraft.memberId=b.dataset.pay; sp.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b)); });
    };
    M.querySelectorAll('#segScope button').forEach(b=>b.addEventListener('click',syncPayer));
    syncPayer();
    const fs=M.querySelector('#f_split'); if(fs) fs.oninput=()=>{ const p=Math.max(0,Math.min(100,parseInt(fs.value)||0)); modalDraft.split=p/100; const h=M.querySelector('#splitHint'); if(h) h.textContent=`${p} % pour ${esc(m1.name)}, ${100-p} % pour ${esc(S.members[1].name)}.`; };
  }
  if(type==='recurrent'){
    if(!modalDraft.memberId) modalDraft.memberId=S.members[0].id;
    const toggle=()=>{ const of=M.querySelector('#recOwnerField'); if(of) of.style.display=(modalDraft.scope==='perso')?'block':'none'; };
    M.querySelectorAll('#segScope button').forEach(b=>b.addEventListener('click',toggle));
    const fq=M.querySelector('#f_freq'); if(fq) fq.onchange=()=>{ modalDraft.freq=parseInt(fq.value)||12; };
  }
}

    else if(act==='prevmonth'||act==='nextmonth'){ const [y,m]=retroWeekMonth(R.cursorWeek).split('-').map(Number);
