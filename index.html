  document.querySelectorAll('[data-pantrydel]').forEach(b=>b.onclick=()=>{ S.meals.pantry=S.meals.pantry.filter(x=>x!==b.dataset.pantrydel); save(); render(); });
  const tp=document.getElementById('togglePantry'); if(tp) tp.onclick=()=>{ MEAL_SHOW_PANTRY=!MEAL_SHOW_PANTRY; render(); };
  // Articles libres
  const addExtra=()=>{ const el=document.getElementById('extraInput'); const v=(el?.value||'').trim(); if(!v) return; S.meals.extras.push({id:uid(),label:v,rayon:guessRayon(v)}); save(); render(); };
  const ea=document.getElementById('extraAdd'); if(ea) ea.onclick=addExtra;
  const ei=document.getElementById('extraInput'); if(ei) ei.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); addExtra(); } };
  document.querySelectorAll('[data-extradel]').forEach(b=>b.onclick=()=>{ const id=b.dataset.extradel; S.meals.extras=S.meals.extras.filter(x=>x.id!==id); delete S.meals.checked['x:'+id]; save(); render(); });
  const ps=document.getElementById('printShop'); if(ps) ps.onclick=exportShoppingList;
  document.querySelectorAll('[data-shop]').forEach(c=>c.onchange=()=>{
    const k=c.dataset.shop;
    if(c.checked) S.meals.checked[k]=true; else delete S.meals.checked[k];
    const item=c.closest('.shop-item'); if(item) item.classList.toggle('done',c.checked);
    updateShopProgress(); save();
  });
}
function updateShopProgress(){
  const el=document.getElementById('shopProg'); if(!el) return;
  const boxes=document.querySelectorAll('[data-shop]');
  const done=[...boxes].filter(b=>b.checked).length;
  el.textContent=done+' / '+boxes.length+' coché'+(boxes.length>1?'s':'');
}

function copyRecurring(){
  const prev=prevMonthKey(curMonth());
  const recs=S.expenses.filter(e=>monthKey(e.date)===prev && e.recurring);
  if(!recs.length){toast('Aucune dépense récurrente le mois dernier à copier.');return;}

}

   IMPORT DE RELEVÉ BANCAIRE (CSV) — détection colonnes + revue
============================================================ */
let IMPORT=null;
function splitCSVLine(line, d){ const out=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++){ const c=line[i];
    if(c==='"'){ if(q&&line[i+1]==='"'){cur+='"';i++;} else q=!q; }
    else if(c===d && !q){ out.push(cur); cur=''; } else cur+=c; }
  out.push(cur); return out.map(s=>s.trim().replace(/^"|"$/g,'')); }
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return [];
  const h=lines[0];
  const d=(h.split(';').length>=h.split(',').length)?(h.split(';').length>=h.split('\t').length?';':'\t'):(h.split(',').length>=h.split('\t').length?',':'\t');
  return lines.map(l=>splitCSVLine(l,d));
}
function parseAmount(s){ if(s==null) return NaN; s=String(s).replace(/\s|€|EUR/gi,'');
  let neg=/^-|-$|^\(.*\)$/.test(s); s=s.replace(/[()\-]/g,''); if(!s) return NaN;
  if(s.indexOf(',')>-1 && s.indexOf('.')>-1){ if(s.lastIndexOf(',')>s.lastIndexOf('.')) s=s.replace(/\./g,'').replace(',','.'); else s=s.replace(/,/g,''); }
  else if(s.indexOf(',')>-1) s=s.replace(',','.');
  const n=parseFloat(s); return isNaN(n)?NaN:(neg?-n:n); }
function parseDateAny(s){ s=String(s||'').trim(); let m;
  if(m=s.match(/(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/)) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  if(m=s.match(/(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})/)) return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  if(m=s.match(/(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{2})\b/)) return `20${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  return null; }
const CATRULES=[['courses',['carrefour','delhaize','colruyt','aldi','lidl','okay','spar','intermarch','albert heijn','supermarch','proxy','cora','match']],['resto',['restaurant','resto','mcdo','mcdonald','quick','burger','pizz','sushi','deliveroo','uber eats','takeaway','frit','brasserie','tavern','cafe','café','bar ']],['transport',['shell','total','esso','q8','texaco','station','sncb','nmbs','de lijn','tec ','stib','mivb','parking','uber','bolt','taxi','carburant','lukoil']],['abo',['netflix','spotify','disney','amazon prime','youtube','icloud','proximus','orange','telenet','base ','scarlet','abonnement','subscription']],['factures',['engie','luminus','eneco','mega','totalenergies','eau','vivaqua','swde','facture','internet']],['sante',['pharmac','pharma','mutuali','mutuelle','partenamut','solidaris','docteur','hopital','hôpital','dentiste','kine','kiné','medic']],['loisirs',['cinema','cinéma','kinepolis','fitness','basic-fit','basic fit','decathlon','décathlon','fnac','steam','playstation','nintendo']],['shopping',['zalando','zara','h&m','amazon','bol.com','coolblue','mediamarkt','ikea','action','primark','veritas']],['enfants',['creche','crèche','ecole','école','one','jouet','dreamland']],['voyages',['booking','airbnb','ryanair','brussels airlines','tui','hotel','hôtel','expedia']],['loyer',['loyer','huur','syndic','immo']]];
function guessCategory(label){ const l=(label||'').toLowerCase(); for(const [c,ks] of CATRULES){ if(ks.some(k=>l.includes(k))) return c; } return 'divers'; }
function detectColumns(rows){
  const header=rows[0]||[]; const data=rows.slice(1); const ncol=Math.max(...rows.map(r=>r.length));
  const H=header.map(h=>String(h).toLowerCase());
  const fh=keys=>{ for(let i=0;i<H.length;i++) if(keys.some(k=>H[i].includes(k))) return i; return -1; };
  let di=fh(['date compt','date d','date','datum','uitvoerdatum']);
  let ai=fh(['montant','bedrag','amount','somme','débit','debet']);
  let li=fh(['communication','description','libell','mededeling','détail','detail','contrepartie','tegenpartij','naam','omschrijving','begunstigde']);
  if(di<0){ for(let c=0;c<ncol;c++){ if(data.filter(r=>parseDateAny(r[c])).length>data.length*0.5){di=c;break;} } }
  if(ai<0){ let best=-1,bs=-1; for(let c=0;c<ncol;c++){ const nums=data.filter(r=>!isNaN(parseAmount(r[c]))).length, negs=data.filter(r=>parseAmount(r[c])<0).length; if(nums>data.length*0.5){ const sc=nums+negs*3; if(sc>bs){bs=sc;best=c;} } } ai=best; }
  if(li<0){ let best=-1,bl=-1; for(let c=0;c<ncol;c++){ if(c===di||c===ai)continue; const avg=data.reduce((s,r)=>s+((r[c]||'').length),0)/(data.length||1); if(avg>bl){bl=avg;best=c;} } li=best; }
  const hasHeader = di>=0 ? !parseDateAny(header[di]) : true;
  return {date:di, amount:ai, label:li, hasHeader};
}
function buildImportItems(){
  if(!IMPORT) return []; const {rows,map}=IMPORT; const start=map.hasHeader?1:0; const items=[];
  for(let i=start;i<rows.length;i++){ const r=rows[i];
    const date=parseDateAny(r[map.date]); const amount=parseAmount(r[map.amount]);
    const label=String(r[map.label]||'').replace(/\s+/g,' ').trim();
    if(!date||isNaN(amount)||amount>=0) continue;   // dépenses uniquement (débits)
    items.push({date, amount, label, include:true, cat:guessCategory(label), scope:'commune'}); }
  return items;
}
function startImportFile(e){ const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ try{ const rows=parseCSV(String(rd.result||'')); if(rows.length<2){toast('Fichier vide ou illisible.');return;}
    const map=detectColumns(rows); IMPORT={filename:f.name,rows,map,account:'commun',items:[]}; IMPORT.items=buildImportItems(); VIEW='import'; render();
  }catch(err){ toast('Impossible de lire ce fichier CSV.'); } };
  rd.readAsText(f); e.target.value='';
}

  document.querySelectorAll('[data-impmap]').forEach(s=>s.onchange=()=>{ IMPORT.map[s.dataset.impmap]=+s.value;
    const hdr=IMPORT.rows[0]||[]; IMPORT.map.hasHeader=!parseDateAny(hdr[IMPORT.map.date]); IMPORT.items=buildImportItems(); rr(); });
  document.querySelectorAll('[data-impchk]').forEach(c=>c.onchange=()=>{ IMPORT.items[+c.dataset.impchk].include=c.checked; refreshImpCounts(); });
  document.querySelectorAll('[data-impcat]').forEach(s=>s.onchange=()=>{ const i=+s.dataset.impcat; IMPORT.items[i].cat=s.value; const em=s.closest('.row').querySelector('.em'); if(em) em.textContent=cat(s.value).e; });
  document.querySelectorAll('[data-impscope]').forEach(b=>b.onclick=()=>{ const it=IMPORT.items[+b.dataset.impscope]; it.scope=it.scope==='commune'?'perso':'commune'; b.textContent=it.scope==='commune'?'Commune':'Perso'; b.className='tag '+(it.scope==='commune'?'commune':'perso'); });
  document.querySelectorAll('[data-impall]').forEach(b=>b.onclick=()=>{ const v=b.dataset.impall==='1'; IMPORT.items.forEach(it=>it.include=v); rr(); });
  const cx=document.querySelector('[data-impcancel]'); if(cx) cx.onclick=()=>{ IMPORT=null; VIEW='depenses'; render(); };
  const dx=document.querySelector('[data-impdo]'); if(dx) dx.onclick=doImport;
}

/* ---------- Navigation ---------- */
document.getElementById('gearBtn').onclick=()=>{ VIEW='reglages'; render(); };
document.getElementById('bellBtn').onclick=()=>{ openModal('activite'); const bd=document.getElementById('bellDot'); if(bd) bd.style.display='none'; };
document.getElementById('prevM').onclick=()=>{S.ui.month=shiftMonth(curMonth(),-1);save();render();};
document.getElementById('nextM').onclick=()=>{S.ui.month=shiftMonth(curMonth(),1);save();render();};
document.getElementById('todayBtn').onclick=()=>{S.ui.month=monthKey(todayISO());save();render();};
document.getElementById('fab').onclick=()=>openModal('depense');
document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

render();
initCloud();

/* PWA : installe le service worker (app installable + hors-ligne). HTTPS ou localhost requis. */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('/sw.js').catch(()=>{}); });
}
</script>
